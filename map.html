<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Интерактивная карта | Классическая Эра</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
</head>
<body class="map-body">

<div id="map-viewport">
            <div id="map-canvas">
        <img src="assets/map/background_galaxy.png" id="bg-layer" alt="Galaxy">
        
        <img src="assets/map/hyperlanes.png" id="hyperlanes-layer" alt="Маршруты"> <div id="stars-layer"></div>

    <div id="system-info-panel" class="hidden">

    </div>

<div id="coord-panel">X: 0 | Y: 0</div>
